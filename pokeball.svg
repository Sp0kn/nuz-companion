<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Bottom white half -->
  <path d="M5 50 A45 45 0 0 0 95 50 Z" fill="white"/>
  <!-- Top red half -->
  <path d="M5 50 A45 45 0 0 1 95 50 Z" fill="#cc2200"/>
  <!-- Outer circle -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#1a1a1a" stroke-width="5"/>
  <!-- Middle band -->
  <line x1="5" y1="50" x2="95" y2="50" stroke="#1a1a1a" stroke-width="8"/>
  <!-- Center button outer -->
  <circle cx="50" cy="50" r="14" fill="white" stroke="#1a1a1a" stroke-width="5"/>
  <!-- Center button inner dot -->
  <circle cx="50" cy="50" r="6" fill="#1a1a1a"/>
</svg>
